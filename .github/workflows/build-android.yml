name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Next.js App (Static Export)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://xcgzhdicwotsbpdankna.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjZ3poZGljd290c2JwZGFua25hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwODU5MzYsImV4cCI6MjA5MzY2MTkzNn0.kr0XdmH2EubX6kUtZ3VvBftadzVUb9PTjfFlgKPh7T4"

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sync Capacitor
        run: |
          chmod +x android/gradlew
          npx cap sync android > sync_log.txt 2>&1 || { echo "## Capacitor Sync Error" >> $GITHUB_STEP_SUMMARY; echo '``' >> $GITHUB_STEP_SUMMARY; cat sync_log.txt >> $GITHUB_STEP_SUMMARY; echo '``' >> $GITHUB_STEP_SUMMARY; cat sync_log.txt; exit 1; }

      - name: Build APK with Gradle
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shivam-mobile-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7





